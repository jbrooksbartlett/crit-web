# fly.toml app configuration file generated for crit-web on 2026-02-19T13:54:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'crit-web'
primary_region = 'lhr'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]

[deploy]
  strategy = 'rolling'

[env]
  PHX_HOST = 'crit-web.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 250

[[vm]]
  cpus = 1
  memory_mb = 512
